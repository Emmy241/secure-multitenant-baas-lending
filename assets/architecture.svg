<svg viewBox="0 0 1060 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="720" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#047857"/>
    </marker>
    <marker id="arrowBoth" markerWidth="10" markerHeight="10" refX="4" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="30" y="34" font-size="19" font-weight="700" fill="#0f172a">Multi-Tenant Banking-as-a-Service / Lending — Reference Architecture</text>
  <text x="30" y="52" font-size="12" fill="#64748b">Six trust boundaries. Financial data is tokenized before TB-3; money moves only through a dual-control gate at TB-6.</text>

  <!-- ================= REGIONS ================= -->
  <rect x="24" y="74" width="180" height="576" rx="10" fill="#fdf2f2" stroke="#e6b8b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="114" y="94" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle" letter-spacing="1">UNTRUSTED</text>

  <rect x="244" y="66" width="592" height="600" rx="12" fill="#f5f8fc" stroke="#b8c9de" stroke-width="1.5"/>
  <text x="258" y="86" font-size="11" font-weight="700" fill="#1e40af" letter-spacing="1">YOUR INFRASTRUCTURE</text>
  <text x="258" y="101" font-size="10" fill="#64748b">IAM / cloud control plane — TB-5 · logical fintech isolation — TB-4</text>

  <!-- third party LLM -->
  <rect x="872" y="236" width="164" height="132" rx="10" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="954" y="256" font-size="11" font-weight="700" fill="#b45309" text-anchor="middle" letter-spacing="1">THIRD PARTY</text>
  <text x="954" y="270" font-size="9.5" fill="#92700e" text-anchor="middle">outside your boundary</text>

  <!-- payment rails external -->
  <rect x="872" y="404" width="164" height="120" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="954" y="424" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle" letter-spacing="1">PAYMENT RAILS</text>
  <text x="954" y="438" font-size="9.5" fill="#047857" text-anchor="middle">external · irreversible</text>

  <!-- ============== TRUST BOUNDARY LINES ============== -->
  <line x1="224" y1="76" x2="224" y2="648" stroke="#64748b" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="206" y="352" width="36" height="18" rx="3" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="224" y="365" font-size="10" font-weight="700" fill="#334155" text-anchor="middle">TB-1</text>

  <line x1="852" y1="230" x2="852" y2="360" stroke="#d97706" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="834" y="286" width="36" height="18" rx="3" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="852" y="299" font-size="10" font-weight="700" fill="#b45309" text-anchor="middle">TB-3</text>

  <line x1="852" y1="410" x2="852" y2="520" stroke="#047857" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="834" y="456" width="36" height="18" rx="3" fill="#ffffff" stroke="#047857" stroke-width="1"/>
  <text x="852" y="469" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">TB-6</text>

  <rect x="300" y="470" width="150" height="18" rx="3" fill="#fff1f1" stroke="#b91c1c" stroke-width="1"/>
  <text x="375" y="483" font-size="10" font-weight="700" fill="#b91c1c" text-anchor="middle">TB-2 · isolation-critical</text>

  <!-- ================= NODES ================= -->
  <!-- Customers -->
  <rect x="44" y="150" width="140" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="114" y="180" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Customers</text>
  <text x="114" y="197" font-size="10" fill="#64748b" text-anchor="middle">borrowers,</text>
  <text x="114" y="209" font-size="10" fill="#64748b" text-anchor="middle">cardholders</text>

  <!-- Messaging channel -->
  <rect x="44" y="416" width="140" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="114" y="442" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Messaging channel</text>
  <text x="114" y="458" font-size="10" fill="#64748b" text-anchor="middle">consumer inbound /</text>
  <text x="114" y="470" font-size="10" fill="#64748b" text-anchor="middle">outbound API</text>

  <!-- Webhook ingestion -->
  <rect x="270" y="118" width="152" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="346" y="142" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Webhook ingestion</text>
  <text x="346" y="158" font-size="10" fill="#64748b" text-anchor="middle">msg + payment</text>
  <text x="346" y="170" font-size="10" fill="#64748b" text-anchor="middle">webhooks; verify sig</text>

  <!-- Secrets manager -->
  <rect x="676" y="118" width="146" height="62" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="749" y="142" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Secrets manager</text>
  <text x="749" y="158" font-size="10" fill="#64748b" text-anchor="middle">keys, creds;</text>
  <text x="749" y="170" font-size="10" fill="#64748b" text-anchor="middle">sequenced rotation</text>

  <!-- API / Orchestration (hub) -->
  <rect x="466" y="250" width="176" height="92" rx="8" fill="#eef4ff" stroke="#1e40af" stroke-width="2"/>
  <text x="554" y="284" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">API / Orchestration</text>
  <text x="554" y="302" font-size="10" fill="#475569" text-anchor="middle">business logic · holds the</text>
  <text x="554" y="315" font-size="10" fill="#475569" text-anchor="middle">DB connection · applies</text>
  <text x="554" y="328" font-size="10" fill="#475569" text-anchor="middle">actions</text>

  <!-- LLM Orchestration -->
  <rect x="676" y="250" width="146" height="92" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="749" y="278" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">LLM Orchestration</text>
  <text x="749" y="296" font-size="10" fill="#64748b" text-anchor="middle">tokenize / redact,</text>
  <text x="749" y="308" font-size="10" fill="#64748b" text-anchor="middle">draft only —</text>
  <text x="749" y="320" font-size="10" fill="#64748b" text-anchor="middle">never authorizes $</text>

  <!-- Money-movement gate (green) -->
  <rect x="676" y="352" width="146" height="56" rx="8" fill="#ecfdf5" stroke="#047857" stroke-width="1.8"/>
  <text x="749" y="374" font-size="11.5" font-weight="700" fill="#065f46" text-anchor="middle">Money-movement gate</text>
  <text x="749" y="390" font-size="9.5" fill="#047857" text-anchor="middle">maker-checker ·</text>
  <text x="749" y="401" font-size="9.5" fill="#047857" text-anchor="middle">dual control · limits</text>

  <!-- Identity / Auth -->
  <rect x="466" y="416" width="176" height="60" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="554" y="441" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Identity / Auth</text>
  <text x="554" y="459" font-size="10" fill="#64748b" text-anchor="middle">tenant_id claim = isolation anchor</text>

  <!-- Observability -->
  <rect x="676" y="428" width="146" height="52" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="749" y="448" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Observability</text>
  <text x="749" y="465" font-size="9.5" fill="#64748b" text-anchor="middle">logs · filters · audit trail</text>

  <!-- Third-party LLM -->
  <rect x="888" y="286" width="132" height="64" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="954" y="314" font-size="12" font-weight="700" fill="#b45309" text-anchor="middle">Third-party LLM</text>
  <text x="954" y="332" font-size="9.5" fill="#92700e" text-anchor="middle">generation</text>

  <!-- Payment rails / ledger -->
  <rect x="888" y="442" width="132" height="64" rx="8" fill="#f0fdf4" stroke="#047857" stroke-width="1.5"/>
  <text x="954" y="470" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">Payment rails</text>
  <text x="954" y="488" font-size="9.5" fill="#047857" text-anchor="middle">/ ledger</text>

  <!-- ============== DATA PLANE (behind TB-2): 5 stores ============== -->
  <!-- Postgres -->
  <rect x="270" y="560" width="100" height="70" rx="8" fill="#fff5f5" stroke="#b91c1c" stroke-width="2"/>
  <text x="320" y="583" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Postgres</text>
  <text x="320" y="598" font-size="8.5" fill="#7f1d1d" text-anchor="middle">shared · RLS+FORCE</text>
  <text x="320" y="609" font-size="8.5" fill="#7f1d1d" text-anchor="middle">non-priv role</text>
  <!-- Cache -->
  <rect x="381" y="560" width="100" height="70" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="431" y="588" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Cache</text>
  <text x="431" y="605" font-size="8.5" fill="#64748b" text-anchor="middle">namespaced</text>
  <!-- Vector store -->
  <rect x="492" y="560" width="100" height="70" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="542" y="586" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Vector store</text>
  <text x="542" y="602" font-size="8.5" fill="#64748b" text-anchor="middle">tenant_id filter</text>
  <text x="542" y="613" font-size="8.5" fill="#64748b" text-anchor="middle">on retrieval</text>
  <!-- KYC docs -->
  <rect x="603" y="560" width="100" height="70" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="653" y="586" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">KYC docs</text>
  <text x="653" y="602" font-size="8.5" fill="#64748b" text-anchor="middle">object storage</text>
  <text x="653" y="613" font-size="8.5" fill="#64748b" text-anchor="middle">scoped paths</text>
  <!-- Token vault -->
  <rect x="714" y="560" width="100" height="70" rx="8" fill="#eff6ff" stroke="#1e40af" stroke-width="1.8"/>
  <text x="764" y="583" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">Token vault</text>
  <text x="764" y="599" font-size="8.5" fill="#334155" text-anchor="middle">(PCI) tokenizes</text>
  <text x="764" y="610" font-size="8.5" fill="#334155" text-anchor="middle">PAN — no egress</text>

  <!-- ================= FLOWS ================= -->
  <line x1="114" y1="212" x2="114" y2="416" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" marker-start="url(#arrowBoth)"/>

  <path d="M184,432 C 220,410 235,300 268,175" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="205" y="272" font-size="9.5" fill="#475569" transform="rotate(-68 205 272)">customer msg</text>

  <line x1="360" y1="180" x2="470" y2="256" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="554" y1="416" x2="554" y2="344" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="700" y1="180" x2="612" y2="250" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- API -> Postgres (critical, TB-2) -->
  <path d="M500,342 C 440,420 380,470 340,558" fill="none" stroke="#b91c1c" stroke-width="2.2" marker-end="url(#arrowRed)"/>
  <!-- API -> other stores -->
  <line x1="524" y1="342" x2="440" y2="558" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="552" y1="342" x2="548" y2="558" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="580" y1="342" x2="650" y2="558" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="606" y1="342" x2="756" y2="558" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- vector -> LLM orchestration (RAG context up, routed left of the gate column) -->
  <path d="M556,558 C 588,486 616,412 690,344" fill="none" stroke="#475569" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="600" y="470" font-size="9" fill="#64748b" transform="rotate(-66 600 470)">RAG context</text>

  <!-- API -> LLM orchestration -->
  <line x1="642" y1="284" x2="676" y2="284" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- LLM orchestration -> third-party LLM (crosses TB-3) -->
  <line x1="822" y1="296" x2="886" y2="304" stroke="#d97706" stroke-width="2.2" marker-end="url(#arrowAmber)"/>

  <!-- LLM orch -> money-movement gate (suggestion only) -->
  <line x1="749" y1="342" x2="749" y2="352" stroke="#047857" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- money-movement gate -> payment rails (crosses TB-6) -->
  <path d="M822,382 C 850,404 866,436 886,462" fill="none" stroke="#047857" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="749" y="422" font-size="9" font-weight="600" fill="#065f46" text-anchor="middle">authorized funds → rails</text>

  <!-- ================= LEGEND ================= -->
  <g transform="translate(30,674)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#b91c1c" stroke-width="2.2"/>
    <text x="30" y="4" font-size="10" fill="#475569">isolation-critical (TB-2)</text>
    <line x1="196" y1="0" x2="220" y2="0" stroke="#d97706" stroke-width="2.2"/>
    <text x="226" y="4" font-size="10" fill="#475569">data leaves boundary (TB-3)</text>
    <line x1="420" y1="0" x2="444" y2="0" stroke="#047857" stroke-width="2.2"/>
    <text x="450" y="4" font-size="10" fill="#475569">money movement · dual control (TB-6)</text>
    <line x1="690" y1="0" x2="714" y2="0" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <text x="720" y="4" font-size="10" fill="#475569">supporting flow</text>
  </g>
</svg>
